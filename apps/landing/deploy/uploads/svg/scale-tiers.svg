<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Four representative corpus sizes — 200, 8k, 25k, 100k Neurons — plotted on a log axis with each tier's ingest, lint, queue, and infrastructure state rendered as a stacked indicator column.">
  <text x="600" y="32" font-family="monospace" font-size="13" fill="currentColor" text-anchor="middle" opacity="0.55" letter-spacing="2">FOUR TIERS ON A LOG AXIS</text>

  <!-- Baseline axis — runs full viewBox width (edge-to-edge) -->
  <line x1="60" y1="380" x2="1140" y2="380" stroke="currentColor" stroke-width="1.4"/>

  <!-- Log-axis tick marks under each tier column -->
  <g stroke="currentColor" stroke-width="0.7" opacity="0.5">
    <line x1="200" y1="380" x2="200" y2="390"/>
    <line x1="520" y1="380" x2="520" y2="390"/>
    <line x1="810" y1="380" x2="810" y2="390"/>
    <line x1="1080" y1="380" x2="1080" y2="390"/>
  </g>

  <!-- Axis labels -->
  <g font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" letter-spacing="0.5">
    <text x="200" y="410">200</text>
    <text x="520" y="410">8,000</text>
    <text x="810" y="410">25,000</text>
    <text x="1080" y="410">100,000</text>
  </g>
  <text x="600" y="448" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" opacity="0.7" letter-spacing="1">NEURONS IN CORPUS</text>

  <!-- ═══════════ TIER 1 — 200 ═══════════ -->
  <g transform="translate(200, 360)">
    <!-- Corpus circle (log-scaled radius) -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="0" cy="0" r="3" fill="#e8a87c"/>

    <!-- Workload bars stacked above baseline -->
    <rect x="-45" y="-40" width="90" height="5" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="-52" y="-36" font-family="monospace" font-size="10" fill="currentColor" text-anchor="end" opacity="0.7">i</text>

    <rect x="-45" y="-56" width="90" height="5" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="-52" y="-52" font-family="monospace" font-size="10" fill="currentColor" text-anchor="end" opacity="0.7">l</text>

    <rect x="-45" y="-72" width="90" height="5" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="-52" y="-68" font-family="monospace" font-size="10" fill="currentColor" text-anchor="end" opacity="0.7">q</text>

    <!-- Infra square -->
    <rect x="-10" y="-110" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4"/>

    <!-- Tier label -->
    <text x="0" y="-132" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" letter-spacing="1">BASELINE</text>
  </g>

  <!-- ═══════════ TIER 2 — 8k ═══════════ -->
  <g transform="translate(520, 360)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="0" cy="0" r="4" fill="#e8a87c"/>

    <rect x="-52" y="-48" width="104" height="5" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="-60" y="-44" font-family="monospace" font-size="10" fill="currentColor" text-anchor="end" opacity="0.7">i</text>

    <!-- lint: sampler active (dashed + amber stripe) -->
    <rect x="-52" y="-64" width="104" height="5" fill="none" stroke="#e8a87c" stroke-width="1.4" stroke-dasharray="4 2"/>
    <line x1="-52" y1="-61" x2="52" y2="-61" stroke="#e8a87c" stroke-width="2" opacity="0.6"/>
    <text x="-60" y="-60" font-family="monospace" font-size="10" fill="currentColor" text-anchor="end" opacity="0.7">l</text>

    <!-- queue: filters matter (single amber tick) -->
    <rect x="-52" y="-80" width="104" height="5" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="12" y1="-80" x2="12" y2="-74" stroke="#e8a87c" stroke-width="1.8"/>
    <text x="-60" y="-76" font-family="monospace" font-size="10" fill="currentColor" text-anchor="end" opacity="0.7">q</text>

    <!-- Infra: perf-2x -->
    <rect x="-12" y="-120" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <circle cx="0" cy="-108" r="2" fill="currentColor"/>

    <text x="0" y="-142" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" letter-spacing="1">SAMPLER</text>
  </g>

  <!-- ═══════════ TIER 3 — 25k ═══════════ -->
  <g transform="translate(810, 360)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="0" cy="0" r="5" fill="#e8a87c"/>

    <rect x="-58" y="-56" width="116" height="5" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="-66" y="-52" font-family="monospace" font-size="10" fill="currentColor" text-anchor="end" opacity="0.7">i</text>

    <!-- lint: sampler + parallel (double amber line) -->
    <rect x="-58" y="-72" width="116" height="5" fill="none" stroke="#e8a87c" stroke-width="1.4" stroke-dasharray="4 2"/>
    <line x1="-58" y1="-69" x2="58" y2="-69" stroke="#e8a87c" stroke-width="2" opacity="0.6"/>
    <line x1="-58" y1="-67" x2="58" y2="-67" stroke="#e8a87c" stroke-width="1.2" opacity="0.45"/>
    <text x="-66" y="-68" font-family="monospace" font-size="10" fill="currentColor" text-anchor="end" opacity="0.7">l</text>

    <!-- queue: roles required (three amber ticks) -->
    <rect x="-58" y="-88" width="116" height="5" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="-30" y1="-88" x2="-30" y2="-82" stroke="#e8a87c" stroke-width="1.8"/>
    <line x1="0" y1="-88" x2="0" y2="-82" stroke="#e8a87c" stroke-width="1.8"/>
    <line x1="30" y1="-88" x2="30" y2="-82" stroke="#e8a87c" stroke-width="1.8"/>
    <text x="-66" y="-84" font-family="monospace" font-size="10" fill="currentColor" text-anchor="end" opacity="0.7">q</text>

    <!-- Infra: perf-4x with quadrants -->
    <rect x="-15" y="-132" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <line x1="0" y1="-132" x2="0" y2="-102" stroke="currentColor" stroke-width="0.7" opacity="0.5"/>
    <line x1="-15" y1="-117" x2="15" y2="-117" stroke="currentColor" stroke-width="0.7" opacity="0.5"/>

    <text x="0" y="-152" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" letter-spacing="1">ROLES</text>
  </g>

  <!-- ═══════════ TIER 4 — 100k ═══════════ -->
  <g transform="translate(1080, 360)">
    <circle cx="0" cy="0" r="38" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="0" cy="0" r="7" fill="#e8a87c"/>
    <!-- Inner rings hinting at sub-clusters -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.3"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.4"/>

    <!-- ingest: context-select tuned (single amber mark) -->
    <rect x="-64" y="-64" width="128" height="5" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="0" y1="-64" x2="0" y2="-58" stroke="#e8a87c" stroke-width="1.8"/>
    <text x="-72" y="-60" font-family="monospace" font-size="10" fill="currentColor" text-anchor="end" opacity="0.7">i</text>

    <!-- lint: sampler + multi-lane (three amber lines) -->
    <rect x="-64" y="-80" width="128" height="5" fill="none" stroke="#e8a87c" stroke-width="1.4" stroke-dasharray="4 2"/>
    <line x1="-64" y1="-77" x2="64" y2="-77" stroke="#e8a87c" stroke-width="2" opacity="0.6"/>
    <line x1="-64" y1="-75" x2="64" y2="-75" stroke="#e8a87c" stroke-width="1.2" opacity="0.45"/>
    <line x1="-64" y1="-73" x2="64" y2="-73" stroke="#e8a87c" stroke-width="1.2" opacity="0.3"/>
    <text x="-72" y="-76" font-family="monospace" font-size="10" fill="currentColor" text-anchor="end" opacity="0.7">l</text>

    <!-- queue: auto-routing + grouping (five amber ticks) -->
    <rect x="-64" y="-96" width="128" height="5" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="-44" y1="-96" x2="-44" y2="-90" stroke="#e8a87c" stroke-width="1.8"/>
    <line x1="-22" y1="-96" x2="-22" y2="-90" stroke="#e8a87c" stroke-width="1.8"/>
    <line x1="0" y1="-96" x2="0" y2="-90" stroke="#e8a87c" stroke-width="1.8"/>
    <line x1="22" y1="-96" x2="22" y2="-90" stroke="#e8a87c" stroke-width="1.8"/>
    <line x1="44" y1="-96" x2="44" y2="-90" stroke="#e8a87c" stroke-width="1.8"/>
    <text x="-72" y="-92" font-family="monospace" font-size="10" fill="currentColor" text-anchor="end" opacity="0.7">q</text>

    <!-- Infra: perf-8x + read-replica (primary + satellite) -->
    <rect x="-18" y="-140" width="36" height="28" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <line x1="-6" y1="-140" x2="-6" y2="-112" stroke="currentColor" stroke-width="0.7" opacity="0.5"/>
    <line x1="6" y1="-140" x2="6" y2="-112" stroke="currentColor" stroke-width="0.7" opacity="0.5"/>
    <rect x="24" y="-130" width="14" height="12" fill="none" stroke="currentColor" stroke-width="1" opacity="0.7"/>
    <line x1="18" y1="-124" x2="24" y2="-124" stroke="currentColor" stroke-width="0.7" stroke-dasharray="2 2" opacity="0.6"/>

    <text x="10" y="-160" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" letter-spacing="1">FEDERATED</text>
  </g>

  <!-- ═══════════ LEGEND — top-left, sits above the tier columns ═══════════ -->
  <g transform="translate(60, 80)" font-family="monospace" font-size="11" fill="currentColor" opacity="0.75">
    <text x="0" y="0" letter-spacing="1.5" opacity="0.55">LEGEND</text>
    <g transform="translate(0, 20)">
      <text x="0" y="4">i — ingest · l — lint · q — queue</text>
    </g>
    <g transform="translate(0, 38)">
      <rect x="0" y="-4" width="18" height="5" fill="none" stroke="currentColor" stroke-width="1"/>
      <text x="26" y="4">default path</text>
    </g>
    <g transform="translate(0, 56)">
      <rect x="0" y="-4" width="18" height="5" fill="none" stroke="#e8a87c" stroke-width="1.4" stroke-dasharray="4 2"/>
      <line x1="0" y1="-1" x2="18" y2="-1" stroke="#e8a87c" stroke-width="1.4" opacity="0.6"/>
      <text x="26" y="4">sampler / bounded pass</text>
    </g>
    <g transform="translate(0, 74)">
      <line x1="4" y1="-2" x2="4" y2="4" stroke="#e8a87c" stroke-width="1.8"/>
      <line x1="10" y1="-2" x2="10" y2="4" stroke="#e8a87c" stroke-width="1.8"/>
      <line x1="16" y1="-2" x2="16" y2="4" stroke="#e8a87c" stroke-width="1.8"/>
      <text x="26" y="4">amber ticks — new behaviour added at this tier</text>
    </g>
  </g>
</svg>
