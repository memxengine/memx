# Trail engine — Phase 1 single-tenant deploy on Fly.io.
#
# Region: arn (Stockholm). Per global policy this is the ONLY allowed
# region for trail infra — never us-* or ams. Change at your own risk.
#
# Deploy from repo root: `fly deploy -c infra/fly/fly.toml`.

app = "trail-engine"
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3031"
  TRAIL_DATA_DIR = "/data"
  TRAIL_DB_PATH = "/data/trail.db"
  TRAIL_UPLOADS_DIR = "/data/uploads"

  # Admin origin for CORS + OAuth redirect. Override via `fly secrets set`
  # if the admin UI lands on a different subdomain than the engine.
  APP_URL = "https://api.trailmem.com"
  API_URL = "https://api.trailmem.com"

  # Haiku for vision + chat + recommender + translator. Flip back to
  # claude-sonnet-4-6 per-service via TRAIL_{SERVICE}_MODEL secrets if
  # quality regresses at scale.
  CHAT_MODEL = "claude-haiku-4-5-20251001"
  VISION_MODEL = "claude-haiku-4-5-20251001"
  INGEST_MODEL = "claude-haiku-4-5-20251001"

  # Single-tenant Phase 1: force the initial seed user so the first
  # login works on a fresh volume. Flip off once F40.2 multi-tenant
  # lands and signup (F41) takes over.
  TRAIL_DEV_AUTH = "0"

# Volume-backed SQLite + uploads. 10 GB covers Sanne's KB with a decade
# of headroom; uploads (PDFs, images) dominate growth. Resize online
# via `fly volumes extend`.
[[mounts]]
  source = "trail_data"
  destination = "/data"

[http_service]
  internal_port = 3031
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "30s"
  method = "GET"
  path = "/api/health"
  protocol = "http"

# Single shared machine is fine for Phase 1. Scale up via
# `fly scale count 2` once F40.2 multi-tenant makes horizontal sharding
# meaningful; until then SQLite write-lock serializes anyway.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
