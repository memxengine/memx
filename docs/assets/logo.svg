<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1a1715"/>

  <!-- Neural network / memex trails: three nodes connected -->
  <!-- Left node -->
  <circle cx="16" cy="40" r="5" fill="#f5f0eb"/>
  <!-- Middle node (larger, accent) -->
  <circle cx="32" cy="22" r="7" fill="#e8a87c"/>
  <!-- Right node -->
  <circle cx="48" cy="40" r="5" fill="#f5f0eb"/>

  <!-- Connecting trails (associative links — Bush's Memex) -->
  <line x1="16" y1="40" x2="32" y2="22" stroke="#f5f0eb" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="48" y1="40" x2="32" y2="22" stroke="#f5f0eb" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="16" y1="40" x2="48" y2="40" stroke="#f5f0eb" stroke-width="1.5" stroke-linecap="round" opacity="0.4" stroke-dasharray="2 2"/>
</svg>
